<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý loại phòng - Hệ thống quản lý nhà trọ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #f8f9fa;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 0.5rem 1rem;
        }
        .sidebar .nav-link.active {
            color: #2470dc;
        }
        .sidebar .nav-link:hover {
            color: #2470dc;
        }
        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        .main-content {
            margin-left: 16.666667%;
            padding: 2rem;
        }
        .user-info {
            text-align: right;
            padding: 1rem;
            border-bottom: 1px solid #dee2e6;
        }
        .logout-btn {
            color: #dc3545;
            cursor: pointer;
            margin-left: 1rem;
        }
        .logout-btn:hover {
            text-decoration: underline;
        }
        .room-type-card {
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .room-type-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4>Quản lý nhà trọ</h4>
                    </div>
                    <div class="user-info">
                        <span id="userFullname"></span>
                        <span class="logout-btn" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Đăng xuất
                        </span>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                <i class="fas fa-home"></i> Trang chủ
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="phong.html">
                                <i class="fas fa-door-open"></i> Quản lý phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="loaiPhong.html">
                                <i class="fas fa-list"></i> Loại phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="nguoiThue.html">
                                <i class="fas fa-users"></i> Người thuê
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hopDong.html">
                                <i class="fas fa-file-contract"></i> Hợp đồng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hoaDon.html">
                                <i class="fas fa-file-invoice-dollar"></i> Hóa đơn
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="thanhToan.html">
                                <i class="fas fa-money-bill-wave"></i> Thanh toán
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisodien.html">
                                <i class="fas fa-bolt"></i> Chỉ số điện
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisonuoc.html">
                                <i class="fas fa-tint"></i> Chỉ số nước
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dichVu.html">
                                <i class="fas fa-concierge-bell"></i> Dịch vụ
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="quanLyTaiKhoan.html">
                                <i class="fas fa-user-cog"></i> Quản lý tài khoản
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý loại phòng</h1>
                    <button class="btn btn-primary" onclick="createRoomType()">
                        <i class="fas fa-plus-circle"></i> Thêm loại phòng
                    </button>
                </div>

                <!-- Room Type List -->
                <div class="row" id="roomTypeList">
                    <!-- Room type cards will be generated here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Room Type Modal -->
    <div class="modal fade" id="addRoomTypeModal" tabindex="-1" aria-labelledby="addRoomTypeModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addRoomTypeModalLabel">Thêm loại phòng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addRoomTypeForm">
                        <div class="mb-3">
                            <label class="form-label">Tên loại phòng</label>
                            <input type="text" name="tenLoaiPhong" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea name="moTa" class="form-control" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="saveRoomTypeBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Config.js"></script>
    <script src="loaiPhong.js" defer></script>
    <script>
        // Debug Config
        console.log('Config loaded:', window.Config);
        
        // Kiểm tra đăng nhập
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));
            
            console.log('Auth check - Token:', token ? 'Có token' : 'Không có token');
            console.log('Auth check - User:', user);
            
            if (!token || !user) {
                console.log('No auth - Redirecting to login');
                window.location.href = 'login.html';
                return;
            }

            // Hiển thị thông tin người dùng
            const userFullname = document.getElementById('userFullname');
            if (userFullname) {
                userFullname.textContent = user.fullname;
            } else {
                console.error('User fullname element not found');
            }
        }

        // Đăng xuất
        window.logout = function() {
            console.log('Logging out');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Kiểm tra đăng nhập khi trang được tải
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM Content Loaded - HTML');
            console.log('Config in HTML:', window.Config);
            checkAuth();
        });
    </script>
</body>
</html>
