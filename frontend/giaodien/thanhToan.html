<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý thanh toán - Hệ thống quản lý nhà trọ</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        .sidebar {
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            padding: 48px 0 0;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
            background-color: #f8f9fa;
        }
        .sidebar .nav-link {
            font-weight: 500;
            color: #333;
            padding: 0.5rem 1rem;
        }
        .sidebar .nav-link.active {
            color: #2470dc;
        }
        .sidebar .nav-link:hover {
            color: #2470dc;
        }
        .sidebar .nav-link i {
            margin-right: 0.5rem;
        }
        .main-content {
            margin-left: 16.666667%;
            padding: 2rem;
        }
        .user-info {
            text-align: right;
            padding: 1rem;
            border-bottom: 1px solid #dee2e6;
        }
        .logout-btn {
            color: #dc3545;
            cursor: pointer;
            margin-left: 1rem;
        }
        .logout-btn:hover {
            text-decoration: underline;
        }
        .payment-card {
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }
        .payment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4>Quản lý nhà trọ</h4>
                    </div>
                    <div class="user-info">
                        <span id="userFullname"></span>
                        <span class="logout-btn" onclick="logout()">
                            <i class="fas fa-sign-out-alt"></i> Đăng xuất
                        </span>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                <i class="fas fa-home"></i> Trang chủ
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="phong.html">
                                <i class="fas fa-door-open"></i> Quản lý phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="loaiPhong.html">
                                <i class="fas fa-list"></i> Loại phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="nguoiThue.html">
                                <i class="fas fa-users"></i> Người thuê
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hopDong.html">
                                <i class="fas fa-file-contract"></i> Hợp đồng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hoaDon.html">
                                <i class="fas fa-file-invoice-dollar"></i> Hóa đơn
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="thanhToan.html">
                                <i class="fas fa-money-bill-wave"></i> Thanh toán
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisodien.html">
                                <i class="fas fa-bolt"></i> Chỉ số điện
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisonuoc.html">
                                <i class="fas fa-tint"></i> Chỉ số nước
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dichVu.html">
                                <i class="fas fa-concierge-bell"></i> Dịch vụ
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="quanLyTaiKhoan.html">
                                <i class="fas fa-user-cog"></i> Quản lý tài khoản
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý thanh toán</h1>
                    <button class="btn btn-primary" onclick="window.setupThanhToan()">
                        <i class="fas fa-plus-circle"></i> Thêm thanh toán
                    </button>
                </div>

                <!-- Unpaid Bills Section -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Hóa đơn chưa thanh toán</h5>
                    </div>
                    <div class="card-body">
                        <div class="row" id="unpaidBillsList">
                            <!-- Unpaid bills will be displayed here -->
                        </div>
                    </div>
                </div>

                <!-- Paid Bills Section -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0">Hóa đơn đã thanh toán</h5>
                    </div>
                    <div class="card-body">
                        <div class="row" id="paidBillsList">
                            <!-- Paid bills will be displayed here -->
                        </div>
                    </div>
                </div>

                <!-- Payment List -->
                <div class="row" id="paymentList">
                    <!-- Payment cards will be generated here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Payment Modal -->
    <div class="modal fade" id="addPaymentModal" tabindex="-1" aria-labelledby="addPaymentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addPaymentModalLabel">Thêm thanh toán</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="addPaymentForm">
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Chọn hóa đơn</label>
                                <select name="maHoaDon" class="form-select" required>
                                    <option value="">Chọn hóa đơn...</option>
                                    <!-- Populated dynamically -->
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Ngày thanh toán</label>
                                <input type="date" name="ngayThanhToan" class="form-control" required>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label">Số tiền</label>
                                <input type="number" name="soTien" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phương thức thanh toán</label>
                                <select name="phuongThucThanhToan" class="form-select" required>
                                    <option value="Tiền mặt">Tiền mặt</option>
                                    <option value="Chuyển khoản">Chuyển khoản</option>
                                    <option value="Thẻ">Thẻ</option>
                                    <option value="MoMo">MoMo</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="row mb-3">
                            <div class="col-md-12">
                                <label class="form-label">Ghi chú</label>
                                <textarea name="ghiChu" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="savePaymentBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Config.js"></script>
    <script>
        // Kiểm tra đăng nhập
        function checkAuth() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user'));
            
            if (!token || !user) {
                window.location.href = 'login.html';
                return;
            }

            // Hiển thị thông tin người dùng
            document.getElementById('userFullname').textContent = user.fullname;
        }

        // Đăng xuất
        window.logout = function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        // Kiểm tra đăng nhập khi trang được tải
        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>
    <script src="thanhToan.js"></script>
</body>
</html>
