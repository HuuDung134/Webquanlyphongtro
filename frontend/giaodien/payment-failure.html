<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thất bại</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .failure-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .failure-icon {
            font-size: 80px;
            color: #dc3545;
            margin-bottom: 20px;
        }
        .error-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .error-details p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="failure-container text-center">
            <i class="fas fa-times-circle failure-icon"></i>
            <h2 class="mb-4">Thanh toán thất bại!</h2>
            <p class="lead">Đã có lỗi xảy ra trong quá trình thanh toán qua MoMo.</p>
            
            <div class="error-details text-start">
                <p><strong>Mã đơn hàng:</strong> <span id="orderId"></span></p>
                <p><strong>Lỗi:</strong> <span id="errorMessage"></span></p>
                <p><strong>Mã lỗi:</strong> <span id="resultCode"></span></p>
                <p><strong>Thời gian:</strong> <span id="responseTime"></span></p>
            </div>

            <div class="mt-4">
                <a href="user-dashboard.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Quay về trang chính
                </a>
                <button onclick="window.history.back()" class="btn btn-outline-primary ms-2">
                    <i class="fas fa-redo"></i> Thử lại
                </button>
            </div>
        </div>
    </div>

    <script>
        // Lấy thông tin từ URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const message = urlParams.get('message');
        const resultCode = urlParams.get('resultCode');
        const responseTime = urlParams.get('responseTime');

        // Hiển thị thông tin
        document.getElementById('orderId').textContent = orderId || 'Không có';
        document.getElementById('errorMessage').textContent = message ? decodeURIComponent(message) : 'Không xác định';
        document.getElementById('resultCode').textContent = resultCode || 'Không có';
        document.getElementById('responseTime').textContent = responseTime ? 
            new Date(parseInt(responseTime)).toLocaleString('vi-VN') : 'Không có';
    </script>
</body>
</html>
