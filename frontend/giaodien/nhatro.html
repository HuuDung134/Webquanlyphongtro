<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý nhà trọ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        .dormitory-card {
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        .dormitory-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .dormitory-icon {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: #0d6efd;
        }
        .description-text {
            color: #6c757d;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                <i class="fas fa-home"></i> Trang chủ
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="phong.html">
                                <i class="fas fa-door-open"></i> Quản lý phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="loaiPhong.html">
                                <i class="fas fa-list"></i> Loại phòng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="nguoiThue.html">
                                <i class="fas fa-users"></i> Người thuê
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hopDong.html">
                                <i class="fas fa-file-contract"></i> Hợp đồng
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="hoaDon.html">
                                <i class="fas fa-file-invoice-dollar"></i> Hóa đơn
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="thanhToan.html">
                                <i class="fas fa-money-bill-wave"></i> Thanh toán
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisodien.html">
                                <i class="fas fa-bolt"></i> Chỉ số điện
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="chisonuoc.html">
                                <i class="fas fa-tint"></i> Chỉ số nước
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="dichVu.html">
                                <i class="fas fa-concierge-bell"></i> Dịch vụ
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý nhà trọ</h1>
                </div>

                <!-- Content -->
                <div class="d-flex justify-content-between mb-3">
                    <h3>Danh sách nhà trọ</h3>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDormitoryModal" onclick="createDormitory()" >
                        <i class="fas fa-plus"></i> Thêm nhà trọ
                    </button>
                </div>
                <div class="row" id="dormitoryList"></div>
            </main>
        </div>
    </div>

    <!-- Add Dormitory Modal -->
    <div class="modal fade" id="addDormitoryModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm nhà trọ</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addDormitoryForm">
                        <div class="mb-3">
                            <label class="form-label">Tên nhà trọ <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" name="tenNhaTro" maxlength="100" required>
                            <div class="form-text">Tối đa 100 ký tự</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ <span class="text-danger">*</span></label>
                            <textarea class="form-control" name="diaChi" rows="3" maxlength="255" required></textarea>
                            <div class="form-text">Tối đa 255 ký tự</div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Mô tả</label>
                            <textarea class="form-control" name="moTa" rows="3" maxlength="500"></textarea>
                            <div class="form-text">Tối đa 500 ký tự</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="saveDormitoryBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Config.js"></script>
    <script src="nhatro.js"></script>
</body>
</html>
