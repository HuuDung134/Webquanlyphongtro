<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .success-container {
            max-width: 600px;
            margin: 100px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .success-icon {
            font-size: 80px;
            color: #28a745;
            margin-bottom: 20px;
        }
        .payment-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 5px;
            margin: 20px 0;
        }
        .payment-details p {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-container text-center">
            <i class="fas fa-check-circle success-icon"></i>
            <h2 class="mb-4">Thanh toán thành công!</h2>
            <p class="lead">Cảm ơn bạn đã thanh toán hóa đơn qua MoMo.</p>
            
            <div class="payment-details text-start">
                <p><strong>Mã đơn hàng:</strong> <span id="orderId"></span></p>
                <p><strong>Số tiền:</strong> <span id="amount"></span></p>
                <p><strong>Nội dung:</strong> <span id="orderInfo"></span></p>
                <p><strong>Thời gian:</strong> <span id="responseTime"></span></p>
            </div>

            <div class="mt-4">
                <a href="user-dashboard.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> Quay về trang chính
                </a>
            </div>
        </div>
    </div>

    <script>
        // Lấy thông tin từ URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId');
        const amount = urlParams.get('amount');
        const orderInfo = urlParams.get('orderInfo');
        const responseTime = urlParams.get('responseTime');

        // Hiển thị thông tin
        document.getElementById('orderId').textContent = orderId;
        document.getElementById('amount').textContent = new Intl.NumberFormat('vi-VN', { 
            style: 'currency', 
            currency: 'VND' 
        }).format(amount);
        document.getElementById('orderInfo').textContent = decodeURIComponent(orderInfo);
        document.getElementById('responseTime').textContent = new Date(parseInt(responseTime)).toLocaleString('vi-VN');
    </script>
</body>
</html>
