<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý giá điện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div id="sidebar"></div>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Quản lý giá điện</h1>
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addGiaDienModal">
                        <i class="fas fa-plus"></i> Thêm giá điện mới
                    </button>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>Mã giá điện</th>
                                <th>Bậc điện</th>
                                <th>Giá tiền điện</th>
                                <th>Từ số điện</th>
                                <th>Đến số điện</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="giaDienTableBody">
                            <!-- Data will be loaded here -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Add Modal -->
    <div class="modal fade" id="addGiaDienModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Thêm giá điện mới</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addGiaDienForm">
                        <div class="mb-3">
                            <label class="form-label">Bậc điện</label>
                            <input type="number" class="form-control" id="bacDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giá tiền điện</label>
                            <input type="number" class="form-control" id="giaTienDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Từ số điện</label>
                            <input type="number" class="form-control" id="tuSoDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Đến số điện</label>
                            <input type="number" class="form-control" id="denSoDien" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="saveGiaDienBtn">Lưu</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editGiaDienModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Sửa giá điện</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editGiaDienForm">
                        <input type="hidden" id="editMaGiaDien">
                        <div class="mb-3">
                            <label class="form-label">Bậc điện</label>
                            <input type="number" class="form-control" id="editBacDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Giá tiền điện</label>
                            <input type="number" class="form-control" id="editGiaTienDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Từ số điện</label>
                            <input type="number" class="form-control" id="editTuSoDien" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Đến số điện</label>
                            <input type="number" class="form-control" id="editDenSoDien" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <button type="button" class="btn btn-primary" id="updateGiaDienBtn">Cập nhật</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Config.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="giaDien.js"></script>
</body>
</html>
