services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doancoso-backend
    ports:
      - "0.0.0.0:5000:80"
      - "0.0.0.0:5001:443"
    environment:
      # Database Connection
      - CONNECTION_STRING=${CONNECTION_STRING}
      
      # JWT Settings
      - JWT_KEY=${JWT_KEY}
      - JWT_ISSUER=${JWT_ISSUER:-DoAnCoSo}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-DoAnCoSoClient}
      
      # Cloudinary Settings
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      
      # Momo Payment Settings
      - MOMO_SECRET_KEY=${MOMO_SECRET_KEY}
      - MOMO_ACCESS_KEY=${MOMO_ACCESS_KEY}
      - MOMO_PARTNER_CODE=${MOMO_PARTNER_CODE:-MOMO}
      - MOMO_RETURN_URL=${MOMO_RETURN_URL:-http://localhost:5000/api/thanhtoan/callback}
      - MOMO_NOTIFY_URL=${MOMO_NOTIFY_URL:-http://localhost:5000/api/thanhtoan/momo-notify}
      
      # Email Settings
      - EMAIL_FROM=${EMAIL_FROM}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-465}
      
      # OCR Settings
      - OCR_API_KEY=${OCR_API_KEY}
      
      # Zalo Settings
      - ZALO_ACCESS_TOKEN=${ZALO_ACCESS_TOKEN}
      
      # Frontend Base URL
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-http://localhost:5500}
      
      # ASP.NET Core
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Production
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - doancoso-network

networks:
  doancoso-network:
    driver: bridge

